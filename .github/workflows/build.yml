name: Build Supported Firmware

on:
  push:
    branches:
      - main
      - ci/*
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  prepare:
    name: Determine supported boards to build
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.select.outputs.boards }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: select
        name: Select board matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            boards=$(python3 scripts/supported_boards.py --changed-from "${{ github.event.pull_request.base.sha }}" --changed-to "${{ github.event.pull_request.head.sha }}" --json)
          else
            boards=$(python3 scripts/supported_boards.py --json)
          fi
          echo "boards=$boards" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.full_name }}
    needs: prepare
    if: ${{ needs.prepare.outputs.boards != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.boards) }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build board firmware
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          ./switch-board.sh "${{ matrix.board }}" build

      - name: Package web flasher payload
        shell: bash
        run: |
          source "$IDF_PATH/export.sh"
          python3 scripts/build_supported_firmware.py --board "${{ matrix.board }}" --output-root dist

      - name: Upload board artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware_${{ matrix.flasher_board_id }}
          path: |
            dist/firmware/${{ matrix.flasher_board_id }}
            dist/release-zips/*.zip
          if-no-files-found: error

  pages:
    name: Publish Web Flasher
    needs:
      - prepare
      - build
    if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && needs.prepare.outputs.boards != '[]' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download firmware artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: firmware_*
          merge-multiple: true
          path: dist

      - name: Assemble web flasher site
        run: |
          python3 scripts/assemble_web_flasher_site.py \
            --firmware-root dist/firmware \
            --release-zips dist/release-zips \
            --output-root site

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v5
